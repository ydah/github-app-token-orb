version: 2.1

jobs:
  test:
    docker:
      - image: cimg/ruby:3.4.8
    steps:
      - checkout
      - run:
          name: Run unit tests
          command: ruby -Itests tests/create_token_test.rb
      - run:
          name: Run lint checks
          command: |
            ruby -c src/scripts/create_token.rb
            ruby -c src/scripts/configure_git.rb
            ruby -c scripts/build_command_wrappers.rb
            ruby -c scripts/pack_orb.rb
            ruby scripts/build_command_wrappers.rb
            bash -n src/scripts/create_command.sh
            bash -n src/scripts/configure_git_command.sh
      - run:
          name: Pack orb
          command: |
            ruby scripts/build_command_wrappers.rb
            ruby scripts/pack_orb.rb
      - run:
          name: Validate orb when CircleCI CLI is available
          command: |
            if command -v circleci >/dev/null 2>&1; then
              circleci orb validate orb.yml
              circleci config validate .circleci/config.yml
            else
              echo "CircleCI CLI is not available in this image."
            fi

workflows:
  test:
    jobs:
      - test
