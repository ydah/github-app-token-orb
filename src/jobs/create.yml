description: Generate a GitHub App installation access token in a reusable CircleCI job.

executor: node

parameters:
  checkout:
    type: boolean
    default: false
    description: Checkout the project before generating the token.
  app_id:
    type: string
    default: ""
    description: GitHub App ID. When empty, the value is read from app_id_env_var.
  app_id_env_var:
    type: string
    default: GITHUB_APP_ID
    description: Environment variable name that stores the GitHub App ID.
  private_key_env_var:
    type: string
    default: GITHUB_APP_PRIVATE_KEY
    description: Environment variable name that stores the GitHub App private key.
  private_key_base64:
    type: boolean
    default: false
    description: Decode the private key environment variable from base64 before use.
  installation_id:
    type: string
    default: ""
    description: GitHub App installation ID. When empty, the ID is read from installation_id_env_var or inferred.
  installation_id_env_var:
    type: string
    default: GITHUB_APP_INSTALLATION_ID
    description: Environment variable name that stores the GitHub App installation ID.
  owner:
    type: string
    default: "${CIRCLE_PROJECT_USERNAME}"
    description: Repository owner used for installation lookup.
  repo:
    type: string
    default: "${CIRCLE_PROJECT_REPONAME}"
    description: Repository name used for installation lookup.
  installation_lookup:
    type: enum
    enum:
      - repo
      - org
      - user
      - app-list
      - none
    default: repo
    description: Strategy used to infer the installation ID when no explicit ID is available.
  repositories:
    type: string
    default: ""
    description: Comma-separated repository names used to restrict the token.
  repository_ids:
    type: string
    default: ""
    description: Comma-separated repository IDs used to restrict the token.
  permissions:
    type: string
    default: ""
    description: JSON object used to restrict token permissions.
  github_api_url:
    type: string
    default: https://api.github.com
    description: GitHub REST API base URL.
  github_api_version:
    type: string
    default: "2026-03-10"
    description: GitHub REST API version header value.
  token_env_var:
    type: string
    default: GH_APP_TOKEN
    description: Environment variable name used to export the generated token.
  export_env_prefix:
    type: string
    default: GH_APP
    description: Prefix used for exported metadata environment variables.
  output_json:
    type: string
    default: /tmp/github-app-token-result.json
    description: Path where token metadata JSON is written.
  include_token_in_output_json:
    type: boolean
    default: false
    description: Include the generated token in output_json.
  configure_git:
    type: boolean
    default: false
    description: Configure the current Git remote to authenticate with the generated token.
  git_remote:
    type: string
    default: origin
    description: Git remote name configured when configure_git is true.

steps:
  - when:
      condition: << parameters.checkout >>
      steps:
        - checkout
  - create:
      app_id: << parameters.app_id >>
      app_id_env_var: << parameters.app_id_env_var >>
      private_key_env_var: << parameters.private_key_env_var >>
      private_key_base64: << parameters.private_key_base64 >>
      installation_id: << parameters.installation_id >>
      installation_id_env_var: << parameters.installation_id_env_var >>
      owner: << parameters.owner >>
      repo: << parameters.repo >>
      installation_lookup: << parameters.installation_lookup >>
      repositories: << parameters.repositories >>
      repository_ids: << parameters.repository_ids >>
      permissions: << parameters.permissions >>
      github_api_url: << parameters.github_api_url >>
      github_api_version: << parameters.github_api_version >>
      token_env_var: << parameters.token_env_var >>
      export_env_prefix: << parameters.export_env_prefix >>
      output_json: << parameters.output_json >>
      include_token_in_output_json: << parameters.include_token_in_output_json >>
      configure_git: << parameters.configure_git >>
      git_remote: << parameters.git_remote >>
